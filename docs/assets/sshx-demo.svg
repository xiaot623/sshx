<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Near-local remote development with sshx</title>
  <desc id="desc">An animated terminal installs sshx, connects to a remote Linux server, starts a development server, automatically forwards its port, and opens the remote app in the local Mac browser.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06110d"/>
      <stop offset=".5" stop-color="#081012"/>
      <stop offset="1" stop-color="#071512"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#101a18"/>
      <stop offset="1" stop-color="#080e0e"/>
    </linearGradient>
    <linearGradient id="browser" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101c1b"/>
      <stop offset="1" stop-color="#0a1213"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="appHero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#153c2e"/>
      <stop offset="1" stop-color="#0d2423"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#34d399" stop-opacity=".18"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="25" flood-color="#000" flood-opacity=".58"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="13" stdDeviation="15" flood-color="#000" flood-opacity=".4"/>
    </filter>
    <clipPath id="terminalClip">
      <rect x="49" y="150" width="719" height="464"/>
    </clipPath>
    <clipPath id="browserClip">
      <rect x="806" y="151" width="345" height="463" rx="0"/>
    </clipPath>
    <style>
      .ui { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .cmd { fill: #b9f8d8; font-size: 17px; font-weight: 620; letter-spacing: -.2px; }
      .prompt { fill: #2dd4bf; font-size: 17px; font-weight: 720; }
      .shell { fill: #718a81; font-size: 12.5px; }
      .out { fill: #819990; font-size: 13.5px; }
      .ok { fill: #6ee7b7; }

      .type1 { animation: type1 24s steps(31,end) infinite; }
      .type2 { animation: type2 24s steps(13,end) infinite; }
      .type3 { animation: type3 24s steps(11,end) infinite; }
      .type4 { animation: type4 24s steps(49,end) infinite; }
      .show1 { animation: show1 24s ease infinite; }
      .show2 { animation: show2 24s ease infinite; }
      .show3 { animation: show3 24s ease infinite; }
      .show4 { animation: show4 24s ease infinite; }
      .out1 { animation: out1 24s ease infinite; }
      .out2 { animation: out2 24s ease infinite; }
      .out3 { animation: out3 24s ease infinite; }
      .forward { animation: forward 24s cubic-bezier(.2,.8,.2,1) infinite; transform-origin: 336px 455px; }
      .out4 { animation: out4 24s ease infinite; }
      .browser-wait { animation: waitState 24s ease infinite; }
      .browser-live { animation: browserIn 24s cubic-bezier(.18,.85,.22,1) infinite; transform-origin: 979px 388px; }
      .route1 { animation: route1 24s ease infinite; }
      .route2 { animation: route2 24s ease infinite; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; }
      .progress { animation: progress 24s linear infinite; transform-origin: left; }
      .all { animation: reset 24s ease infinite; }

      @keyframes type1 { 0%,1% { clip-path: inset(0 100% 0 0); opacity:1 } 9%,93% { clip-path: inset(0 0 0 0); opacity:1 } 97%,100% { opacity:0 } }
      @keyframes type2 { 0%,13% { clip-path: inset(0 100% 0 0); opacity:1 } 20%,93% { clip-path: inset(0 0 0 0); opacity:1 } 97%,100% { opacity:0 } }
      @keyframes type3 { 0%,27% { clip-path: inset(0 100% 0 0); opacity:1 } 33%,93% { clip-path: inset(0 0 0 0); opacity:1 } 97%,100% { opacity:0 } }
      @keyframes type4 { 0%,51% { clip-path: inset(0 100% 0 0); opacity:1 } 65%,93% { clip-path: inset(0 0 0 0); opacity:1 } 97%,100% { opacity:0 } }
      @keyframes show1 { 0%,1% { opacity:0 } 1.1%,93% { opacity:1 } 97%,100% { opacity:0 } }
      @keyframes show2 { 0%,13% { opacity:0 } 13.1%,93% { opacity:1 } 97%,100% { opacity:0 } }
      @keyframes show3 { 0%,27% { opacity:0 } 27.1%,93% { opacity:1 } 97%,100% { opacity:0 } }
      @keyframes show4 { 0%,51% { opacity:0 } 51.1%,93% { opacity:1 } 97%,100% { opacity:0 } }
      @keyframes out1 { 0%,9% { opacity:0; transform:translateY(-3px) } 11%,93% { opacity:1; transform:translateY(0) } 97%,100% { opacity:0 } }
      @keyframes out2 { 0%,20% { opacity:0; transform:translateY(-3px) } 22%,93% { opacity:1; transform:translateY(0) } 97%,100% { opacity:0 } }
      @keyframes out3 { 0%,33% { opacity:0; transform:translateY(-3px) } 35%,93% { opacity:1; transform:translateY(0) } 97%,100% { opacity:0 } }
      @keyframes forward { 0%,41% { opacity:0; transform:translateY(8px) scale(.97) } 46%,93% { opacity:1; transform:translateY(0) scale(1) } 97%,100% { opacity:0 } }
      @keyframes out4 { 0%,65% { opacity:0; transform:translateY(-3px) } 68%,93% { opacity:1; transform:translateY(0) } 97%,100% { opacity:0 } }
      @keyframes waitState { 0%,61% { opacity:1 } 67%,100% { opacity:0 } }
      @keyframes browserIn { 0%,63% { opacity:0; transform:translateY(18px) scale(.96) } 70%,93% { opacity:1; transform:translateY(0) scale(1) } 97%,100% { opacity:0 } }
      @keyframes route1 { 0%,37% { stroke-dashoffset:95; opacity:0 } 42% { opacity:1 } 48%,93% { stroke-dashoffset:0; opacity:1 } 97%,100% { opacity:0 } }
      @keyframes route2 { 0%,63% { stroke-dashoffset:95; opacity:0 } 67% { opacity:1 } 73%,93% { stroke-dashoffset:0; opacity:1 } 97%,100% { opacity:0 } }
      @keyframes pulse { 0%,100% { opacity:.45 } 50% { opacity:1 } }
      @keyframes progress { 0% { transform:scaleX(0) } 93%,100% { transform:scaleX(1) } }
      @keyframes reset { 0%,93% { opacity:1 } 97%,100% { opacity:0 } }

      @media (prefers-reduced-motion: reduce) {
        .type1,.type2,.type3,.type4,.show1,.show2,.show3,.show4,.out1,.out2,.out3,.out4,.forward,.browser-live,.route1,.route2,.progress,.all { animation:none; opacity:1; clip-path:none; transform:none; stroke-dashoffset:0; }
        .browser-wait,.pulse { display:none; }
      }
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <ellipse cx="128" cy="83" rx="330" ry="275" fill="url(#glow)"/>
  <ellipse cx="1100" cy="626" rx="380" ry="310" fill="url(#glow)" opacity=".72"/>
  <path d="M0 643C245 565 411 706 650 629s382-85 550 9v82H0Z" fill="#092019" opacity=".42"/>

  <g class="all" filter="url(#shadow)">
    <rect x="26" y="27" width="1148" height="665" rx="23" fill="#0b1212" stroke="#29453b" stroke-width="1.2"/>
    <rect x="27" y="28" width="1146" height="94" rx="22" fill="#101b19"/>
    <path d="M27 100h1146v22H27Z" fill="#101b19"/>
    <path d="M27 122h1146" stroke="#294039"/>
  </g>

  <g class="all ui">
    <circle cx="61" cy="69" r="7" fill="#ff6b67"/>
    <circle cx="85" cy="69" r="7" fill="#f7c94c"/>
    <circle cx="109" cy="69" r="7" fill="#45d483"/>
    <g transform="translate(158 49)">
      <rect width="49" height="39" rx="11" fill="#173a2c" stroke="#286249"/>
      <path d="M14 14h10l-4 4 4 4H14m13 0h7" fill="none" stroke="#69e9b1" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="222" y="66" fill="#d9ebe3" font-size="15" font-weight="700">sshx</text>
    <text x="222" y="86" fill="#688077" font-size="11" font-weight="600" letter-spacing="1.35">REMOTE, WITHOUT THE DISTANCE</text>

    <g transform="translate(906 52)">
      <rect width="220" height="34" rx="17" fill="#091310" stroke="#29433a"/>
      <circle class="pulse" cx="19" cy="17" r="5" fill="#45d483"/>
      <text x="33" y="21" fill="#8ba299" font-size="11" font-weight="700" letter-spacing=".75">OPENSSH · ENHANCED</text>
    </g>
  </g>

  <!-- Terminal -->
  <g class="all" filter="url(#cardShadow)">
    <rect x="48" y="145" width="721" height="470" rx="17" fill="url(#terminal)" stroke="#263e36"/>
    <path d="M48 186h721" stroke="#263a34"/>
  </g>
  <g class="all ui">
    <circle cx="70" cy="166" r="4.5" fill="#45d483"/>
    <text x="82" y="170" fill="#8aa097" font-size="10.5" font-weight="750" letter-spacing="1">TERMINAL</text>
    <g transform="translate(631 155)">
      <rect width="116" height="23" rx="11.5" fill="#11271f" stroke="#24503b"/>
      <text x="15" y="15.5" fill="#64d99e" font-size="9.5" font-weight="750" letter-spacing=".8">LOCAL · macOS</text>
    </g>
  </g>

  <g class="all mono" clip-path="url(#terminalClip)">
    <!-- Install locally -->
    <g>
      <text x="70" y="224" class="shell show1">alex@mac ~ %</text>
      <text x="169" y="224" class="cmd type1">npm install -g @hahahhh/sshx</text>
      <g class="out1">
        <circle cx="76" cy="249" r="3" fill="#34d399"/>
        <text x="89" y="254" class="out ok">installed</text>
        <text x="171" y="254" class="out">sshx is ready</text>
      </g>
    </g>

    <!-- Connect -->
    <g>
      <text x="70" y="299" class="shell show2">alex@mac ~ %</text>
      <text x="169" y="299" class="cmd type2">sshx myserver</text>
      <g class="out2">
        <circle cx="76" cy="324" r="3" fill="#34d399"/>
        <text x="89" y="329" class="out ok">connected</text>
        <text x="171" y="329" class="out">Linux · secure sidecar ready</text>
        <g class="ui" transform="translate(579 309)">
          <rect width="167" height="28" rx="14" fill="#102b20" stroke="#296648"/>
          <circle cx="19" cy="14" r="4.5" fill="#45d483"/>
          <text x="32" y="18" fill="#86efac" font-size="9.5" font-weight="800" letter-spacing=".8">REMOTE · LINUX</text>
        </g>
      </g>
    </g>

    <!-- Start app remotely -->
    <g>
      <text x="70" y="376" class="shell show3">dev@myserver:~$</text>
      <text x="202" y="376" class="cmd type3">npm run dev</text>
      <g class="out3">
        <path d="M76 394v34" stroke="#24483b" stroke-width="2"/>
        <circle cx="76" cy="406" r="3" fill="#34d399"/>
        <text x="89" y="411" class="out">VITE ready in 412 ms</text>
        <circle cx="76" cy="428" r="3" fill="#34d399"/>
        <text x="89" y="433" class="out">Local: http://127.0.0.1:3000</text>
      </g>
    </g>

    <!-- Automatic port forwarding -->
    <g class="forward ui">
      <rect x="70" y="451" width="676" height="59" rx="12" fill="#0d261d" stroke="#285b43"/>
      <g transform="translate(87 465)">
        <path d="M3 8h16m-5-5 5 5-5 5" fill="none" stroke="#5ee6aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="119" y="476" fill="#8df0bd" font-size="11" font-weight="800" letter-spacing=".75">PORT 3000 · FORWARDED AUTOMATICALLY</text>
      <text x="119" y="497" fill="#7f9c90" font-size="12.5" font-weight="600">http://myserver.alex.sshx:3000</text>
      <rect x="646" y="468" width="82" height="24" rx="12" fill="#143c2b"/>
      <text x="665" y="484" fill="#6ee7b7" font-size="9.5" font-weight="800" letter-spacing=".8">NO -L FLAG</text>
    </g>

    <!-- Invoke the local browser from remote -->
    <g>
      <text x="70" y="554" class="shell show4">dev@myserver:~$</text>
      <text x="202" y="554" class="cmd type4">sshx local open http://myserver.alex.sshx:3000</text>
      <g class="out4">
        <circle cx="76" cy="580" r="3" fill="#2dd4bf"/>
        <text x="89" y="585" class="out ok">opened on your local Mac</text>
        <rect x="296" y="568" width="142" height="24" rx="12" fill="#102b2b" stroke="#236267"/>
        <text x="314" y="584" fill="#67e8f9" class="ui" font-size="9.5" font-weight="800" letter-spacing=".75">REMOTE → LOCAL</text>
      </g>
    </g>
  </g>

  <!-- Route between terminal and local browser -->
  <g class="all" fill="none" stroke="#3bd69a" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 7">
    <path class="route1" d="M769 478c24 0 25-38 45-38" stroke-dasharray="95" stroke-dashoffset="95"/>
    <path class="route2" d="M769 557c24 0 25-74 45-74" stroke="#2dd4bf" stroke-dasharray="95" stroke-dashoffset="95"/>
  </g>

  <!-- Local browser -->
  <g class="all" filter="url(#cardShadow)">
    <rect x="805" y="145" width="347" height="470" rx="17" fill="url(#browser)" stroke="#29413a"/>
    <path d="M805 186h347" stroke="#293b36"/>
  </g>
  <g class="all ui">
    <circle cx="826" cy="166" r="4" fill="#ff6b67"/>
    <circle cx="840" cy="166" r="4" fill="#f7c94c"/>
    <circle cx="854" cy="166" r="4" fill="#45d483"/>
    <g transform="translate(870 155)">
      <rect width="261" height="23" rx="11.5" fill="#09110f" stroke="#263b34"/>
      <circle cx="15" cy="11.5" r="3" fill="#45d483"/>
      <text x="25" y="15" fill="#718a81" font-size="8.8" font-weight="650">myserver.alex.sshx:3000</text>
    </g>
  </g>

  <g class="browser-wait ui">
    <circle cx="979" cy="352" r="43" fill="#10241d" stroke="#244c3a"/>
    <path d="M959 353h40m-10-10 10 10-10 10" fill="none" stroke="#54dca1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="979" y="426" text-anchor="middle" fill="#7d938b" font-size="12" font-weight="700">Waiting for a remote app</text>
    <text x="979" y="447" text-anchor="middle" fill="#52675f" font-size="10.5">No port mapping configured</text>
  </g>

  <g class="browser-live ui" clip-path="url(#browserClip)">
    <rect x="806" y="187" width="345" height="427" fill="#0b1414"/>
    <g transform="translate(826 211)">
      <rect width="305" height="171" rx="14" fill="url(#appHero)" stroke="#27533f"/>
      <circle cx="31" cy="31" r="15" fill="#1d5a40"/>
      <path d="M24 31h14m-5-5 5 5-5 5" fill="none" stroke="#75f0b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="54" y="28" fill="#a7f3d0" font-size="12" font-weight="800">Remote app</text>
      <text x="54" y="44" fill="#6f9585" font-size="9.5">served from myserver</text>
      <text x="24" y="99" fill="#dcfcef" font-size="27" font-weight="760" letter-spacing="-.7">It just works.</text>
      <text x="24" y="127" fill="#84a89a" font-size="11.5">Remote server. Local browser.</text>
      <g transform="translate(224 20)">
        <rect width="59" height="22" rx="11" fill="#173e2d"/>
        <circle class="pulse" cx="13" cy="11" r="3.5" fill="#45d483"/>
        <text x="22" y="14.5" fill="#80edb4" font-size="8.5" font-weight="800" letter-spacing=".7">LIVE</text>
      </g>
    </g>
    <g transform="translate(826 400)">
      <rect width="145" height="79" rx="12" fill="#101d1b" stroke="#243c35"/>
      <text x="16" y="23" fill="#718c81" font-size="9.5" font-weight="750" letter-spacing=".75">LATENCY</text>
      <text x="16" y="54" fill="#b5f5d5" font-size="22" font-weight="760">18 ms</text>
      <path d="M88 53l10-11 11 7 18-22" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(986 400)">
      <rect width="145" height="79" rx="12" fill="#101d1b" stroke="#243c35"/>
      <text x="16" y="23" fill="#718c81" font-size="9.5" font-weight="750" letter-spacing=".75">FORWARD</text>
      <text x="16" y="54" fill="#b5f5d5" font-size="22" font-weight="760">:3000</text>
      <circle cx="121" cy="49" r="10" fill="#173f2e"/>
      <path d="M116 49h10m-4-4 4 4-4 4" fill="none" stroke="#64e3a8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(826 495)">
      <rect width="305" height="94" rx="12" fill="#0e1918" stroke="#203730"/>
      <circle cx="21" cy="23" r="4" fill="#45d483"/>
      <rect x="34" y="19" width="92" height="7" rx="3.5" fill="#315046"/>
      <rect x="16" y="42" width="271" height="6" rx="3" fill="#1f3530"/>
      <rect x="16" y="57" width="223" height="6" rx="3" fill="#1b2e2a"/>
      <rect x="16" y="72" width="252" height="6" rx="3" fill="#172824"/>
    </g>
  </g>

  <!-- Outcome strip -->
  <g class="all ui">
    <rect x="48" y="640" width="1104" height="3" rx="1.5" fill="#1d342d"/>
    <rect class="progress" x="48" y="640" width="1104" height="3" rx="1.5" fill="url(#accent)"/>
    <g transform="translate(48 660)">
      <text x="0" y="14" fill="#5d786e" font-size="10" font-weight="750" letter-spacing="1.1">CONNECT</text>
      <circle cx="98" cy="10" r="2.5" fill="#315046"/>
      <text x="116" y="14" fill="#5d786e" font-size="10" font-weight="750" letter-spacing="1.1">AUTO-FORWARD</text>
      <circle cx="250" cy="10" r="2.5" fill="#315046"/>
      <text x="268" y="14" fill="#5d786e" font-size="10" font-weight="750" letter-spacing="1.1">OPEN LOCALLY</text>
      <text x="1104" y="14" text-anchor="end" fill="#69dca7" font-size="10" font-weight="800" letter-spacing="1.15">REMOTE → LOCAL, ZERO CEREMONY</text>
    </g>
  </g>
</svg>
