<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="1200" height="1000" role="img" aria-labelledby="title desc">
  <title id="title">sshx remote server bootstrap and replacement flow</title>
  <desc id="desc">Flowchart showing that sshx reuses a running server when RuntimeID matches, and installs the client release only when RuntimeID is missing or different.</desc>
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .title { fill: #111827; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #6b7280; font-size: 13px; }
    .node-title { fill: #111827; font-size: 15px; font-weight: 600; }
    .node-sub { fill: #4b5563; font-size: 12px; }
    .decision { fill: #111827; font-size: 14px; font-weight: 600; }
    .edge-label { fill: #374151; font-size: 12px; font-weight: 600; }
    .note-title { fill: #9a3412; font-size: 13px; font-weight: 700; }
    .note-text { fill: #7c2d12; font-size: 12px; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="1000" fill="#ffffff"/>
  <text x="600" y="38" text-anchor="middle" class="title">Remote Server Bootstrap and Replacement</text>
  <text x="600" y="62" text-anchor="middle" class="subtitle">Compatibility is decided by RuntimeID, not AppVersion equality</text>

  <!-- Start -->
  <rect x="455" y="88" width="290" height="64" rx="28" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="115" text-anchor="middle" class="node-title">Matched connection</text>
  <text x="600" y="135" text-anchor="middle" class="node-sub">A server-backed feature is enabled</text>

  <!-- Probe -->
  <polygon points="430,188 770,188 740,266 400,266" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5"/>
  <text x="585" y="215" text-anchor="middle" class="node-title">Probe selected runtime home</text>
  <text x="585" y="236" text-anchor="middle" class="node-sub">OS · arch · binary/server versions</text>
  <text x="585" y="253" text-anchor="middle" class="node-sub">RuntimeID · socket · server-info</text>

  <!-- Version note -->
  <rect x="815" y="184" width="320" height="88" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="835" y="208" class="note-title">Important</text>
  <text x="835" y="230" class="note-text">BinaryVersion and ServerVersion are observed,</text>
  <text x="835" y="249" class="note-text">but are not used by the replacement decision.</text>

  <!-- Decision 1 -->
  <polygon points="600,304 790,374 600,444 410,374" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="600" y="365" text-anchor="middle" class="decision">Server running AND</text>
  <text x="600" y="385" text-anchor="middle" class="decision">RuntimeID matches?</text>

  <!-- Reuse -->
  <rect x="890" y="334" width="250" height="80" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1015" y="364" text-anchor="middle" class="node-title">Reuse server</text>
  <text x="1015" y="385" text-anchor="middle" class="node-sub">Different AppVersions may coexist</text>

  <!-- Decision 2 -->
  <polygon points="600,484 730,538 600,592 470,538" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="600" y="544" text-anchor="middle" class="decision">Server running?</text>

  <!-- Stop -->
  <rect x="890" y="500" width="250" height="76" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="1015" y="530" text-anchor="middle" class="node-title">Stop selected server</text>
  <text x="1015" y="551" text-anchor="middle" class="node-sub">Wait briefly, then clear stale files</text>

  <!-- Decision 3 -->
  <polygon points="600,632 790,702 600,772 410,702" fill="#fff7ed" stroke="#fb923c" stroke-width="1.8"/>
  <text x="600" y="693" text-anchor="middle" class="decision">Binary RuntimeID</text>
  <text x="600" y="713" text-anchor="middle" class="decision">missing or different?</text>

  <!-- Download and install -->
  <rect x="70" y="660" width="270" height="84" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="205" y="689" text-anchor="middle" class="node-title">Download exact AppVersion</text>
  <text x="205" y="710" text-anchor="middle" class="node-sub">Cache by version, OS, and arch</text>
  <text x="205" y="727" text-anchor="middle" class="node-sub">Or use SSHX_REMOTE_BINARY</text>

  <rect x="70" y="786" width="270" height="84" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="205" y="815" text-anchor="middle" class="node-title">Upload and install</text>
  <text x="205" y="836" text-anchor="middle" class="node-sub">Install lock · temp file · atomic rename</text>
  <text x="205" y="853" text-anchor="middle" class="node-sub">Result: $SSHX_SERVER_HOME/sshx</text>

  <!-- Start server -->
  <rect x="455" y="812" width="290" height="72" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="841" text-anchor="middle" class="node-title">Start selected binary</text>
  <text x="600" y="862" text-anchor="middle" class="node-sub">nohup server · fresh token · server-info</text>

  <!-- Verify/end -->
  <rect x="455" y="922" width="290" height="58" rx="27" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="957" text-anchor="middle" class="node-title">Verify socket + server-info → ready</text>

  <!-- Main arrows -->
  <path d="M 600 152 L 600 188" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 600 266 L 600 304" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 600 444 L 600 484" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="575" y="451" width="50" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="466" text-anchor="middle" class="edge-label">No</text>
  <path d="M 600 592 L 600 632" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Reuse branch -->
  <path d="M 790 374 L 890 374" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="817" y="358" width="42" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="838" y="373" text-anchor="middle" class="edge-label">Yes</text>
  <path d="M 1140 374 L 1165 374 L 1165 951 L 745 951" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Running branch -->
  <path d="M 730 538 L 890 538" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="786" y="522" width="42" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="807" y="537" text-anchor="middle" class="edge-label">Yes</text>
  <path d="M 1015 576 L 1015 612 L 820 612 L 820 702 L 790 702" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="575" y="604" width="50" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="619" text-anchor="middle" class="edge-label">No</text>

  <!-- Install branch -->
  <path d="M 410 702 L 340 702" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="360" y="686" width="42" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="381" y="701" text-anchor="middle" class="edge-label">Yes</text>
  <path d="M 205 744 L 205 786" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 340 828 L 400 828 L 400 848 L 455 848" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Existing binary branch -->
  <path d="M 600 772 L 600 812" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="575" y="779" width="50" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="794" text-anchor="middle" class="edge-label">No</text>
  <path d="M 600 884 L 600 922" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Legend -->
  <g transform="translate(825,806)">
    <rect x="0" y="0" width="310" height="82" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <line x1="18" y1="23" x2="54" y2="23" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="66" y="28" class="node-sub">Bootstrap control flow</text>
    <line x1="18" y1="43" x2="54" y2="43" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="66" y="48" class="node-sub">Compatible runtime reuse</text>
    <line x1="18" y1="63" x2="54" y2="63" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <text x="66" y="68" class="node-sub">Binary download and installation</text>
  </g>
</svg>
